name: collect

on:
  schedule:
    - cron: "*/15 * * * *"   # every 15 minutes
  workflow_dispatch:           # allow manual trigger from Actions UI

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 8

    permissions:
      contents: write          # needed to commit the DB back

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run one collection pass
        run: python collect_once.py

      - name: Commit updated DB
        run: |
          git config user.name  "poly-potato-bot"
          git config user.email "actions@github.com"
          git add data/poly_potato.db
          git diff --cached --quiet || git commit -m "data: $(date -u +'%Y-%m-%d %H:%M UTC')"
          git push
